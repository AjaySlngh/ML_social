services:
  backend:
    build:
      context: ./backend
    container_name: ml-social-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: ml-social-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
